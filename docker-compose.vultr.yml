
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
      NODE_ENV: production
    depends_on:
      - backend
    restart: always
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Do NOT expose 8080:8080 to the public — bind to localhost only for Nginx
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: "postgresql://sro:${POSTGRES_PASSWORD}@db:5432/sro"
      ENVIRONMENT: "production"
      CORS_ORIGINS: "https://sovereignroboticsops.nov-tia.com,http://sovereignroboticsops.nov-tia.com,http://localhost:3000"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GEMINI_PROJECT_ID: "${GEMINI_PROJECT_ID}"
      GEMINI_ENABLED: "true"
      JWT_SECRET: "${JWT_SECRET}"
      SIM_TOKEN: "${SIM_TOKEN}"
      SIM_BASE_URL: "http://sim:8090"
    depends_on:
      - db
      - sim
    volumes:
      - backend_data:/app/data
  db:
    image: postgres:16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: sro
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: sro
    volumes:
      - postgres_data:/var/lib/postgresql/data
  sim:
    build:
      context: ./sim/mock_sim
      dockerfile: Dockerfile
    environment:
      SIM_TICK_HZ: "10"
    command: >
      uvicorn server:app --host 0.0.0.0 --port 8090
    restart: always

volumes:
  postgres_data:
  backend_data:
