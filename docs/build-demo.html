<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRO — Build &amp; Deploy Demo</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --dim: #6e7681;
    --green: #3fb950;
    --cyan: #58a6ff;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #d18616;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: #fff;
  }
  .subtitle {
    color: var(--dim);
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  /* Progress bar */
  .progress-bar {
    width: 100%;
    max-width: 900px;
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
  }
  .progress-step {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.4s;
    position: relative;
  }
  .progress-step.active { background: var(--cyan); }
  .progress-step.done { background: var(--green); }
  .progress-label {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    color: var(--dim);
    white-space: nowrap;
    transition: color 0.3s;
  }
  .progress-step.active .progress-label,
  .progress-step.done .progress-label { color: var(--text); }

  /* Terminal */
  .terminal {
    width: 100%;
    max-width: 900px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
  }
  .terminal-header {
    background: var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }
  .dot-green { background: var(--green); }
  .terminal-title {
    flex: 1;
    text-align: center;
    color: var(--dim);
    font-size: 0.8rem;
  }
  .terminal-body {
    padding: 16px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    min-height: 420px;
    max-height: 520px;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  .line { white-space: pre-wrap; word-break: break-all; }
  .cmd { color: var(--green); }
  .cmd::before { content: '$ '; color: var(--cyan); }
  .comment { color: var(--dim); font-style: italic; }
  .banner { color: var(--cyan); font-weight: bold; }
  .ok { color: var(--green); }
  .warn { color: var(--yellow); }
  .err { color: var(--red); }
  .highlight { color: var(--purple); }
  .info { color: var(--text); }
  .file { color: var(--orange); }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 1.1em;
    background: var(--green);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Controls */
  .controls {
    width: 100%;
    max-width: 900px;
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { background: var(--border); color: #fff; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); font-weight: 600; }
  button.primary:hover { opacity: 0.85; }
  .speed-label { color: var(--dim); font-size: 0.8rem; align-self: center; }

  /* Architecture diagram */
  .arch-box {
    display: inline-block;
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    margin: 1px;
  }

  /* Footer */
  .footer {
    margin-top: 20px;
    color: var(--dim);
    font-size: 0.75rem;
    text-align: center;
  }
  .footer a { color: var(--cyan); text-decoration: none; }
</style>
</head>

// ── State ────────────────────────────────────────────────────────
let currentStep = 0;
let lineIndex = 0;
let playing = false;
let speed = 1;
let timer = null;

const body = document.getElementById("termBody");
const bar = document.getElementById("progressBar");
const title = document.getElementById("termTitle");

// Build progress bar
STEPS.forEach((s, i) => {
  const el = document.createElement("div");
  el.className = "progress-step";
  el.innerHTML = `<span class="progress-label">${s.label}</span>`;
  el.onclick = () => goToStep(i);
  el.style.cursor = "pointer";
  bar.appendChild(el);
});

function updateProgress() {
  bar.querySelectorAll(".progress-step").forEach((el, i) => {
    el.classList.remove("active", "done");
    if (i < currentStep) el.classList.add("done");
    else if (i === currentStep) el.classList.add("active");
  });
}

function lineDelay(line) {
  const base = line.type === "cmd" ? 600 : line.type === "banner" ? 400 : 120;
  return base / speed;
}

function renderLine(line) {
  const div = document.createElement("div");
  div.className = `line ${line.type}`;
  if (line.type === "cmd") {
    div.classList.add("cmd");
  }
  div.textContent = line.text;
  return div;
}

function showStep(stepIdx, animate) {
  currentStep = stepIdx;
  lineIndex = 0;
  body.innerHTML = "";
  title.textContent = `sro — ${STEPS[stepIdx].title}`;
  updateProgress();

  if (animate) {
    typeNextLine();
  } else {
    // Show all lines immediately
    STEPS[stepIdx].lines.forEach(l => body.appendChild(renderLine(l)));
    addCursor();
    scrollToBottom();
  }
}

function addCursor() {
  // Remove old cursor
  const old = body.querySelector(".cursor");
  if (old) old.remove();
  const c = document.createElement("span");
  c.className = "cursor";
  body.appendChild(c);
}

function scrollToBottom() {
  body.scrollTop = body.scrollHeight;
}

function typeNextLine() {
  clearTimeout(timer);
  const step = STEPS[currentStep];
  if (lineIndex >= step.lines.length) {
    addCursor();
    // Auto-advance if playing
    if (playing && currentStep < STEPS.length - 1) {
      timer = setTimeout(() => nextStep(), 1500 / speed);
    } else if (playing && currentStep >= STEPS.length - 1) {
      playing = false;
      updatePlayBtn();
    }
    return;
  }

  const line = step.lines[lineIndex];
  body.appendChild(renderLine(line));
  scrollToBottom();
  lineIndex++;
  timer = setTimeout(typeNextLine, lineDelay(line));
}

function goToStep(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  clearTimeout(timer);
  showStep(idx, playing);
  if (!playing) showStep(idx, false); // show instantly if paused
}

function nextStep() {
  if (currentStep < STEPS.length - 1) {
    goToStep(currentStep + 1);
  }
}

function prevStep() {
  if (currentStep > 0) {
    goToStep(currentStep - 1);
  }
}

function togglePlay() {
  playing = !playing;
  updatePlayBtn();
  if (playing) {
    showStep(currentStep, true);
  } else {
    clearTimeout(timer);
    // Show remaining lines instantly
    const step = STEPS[currentStep];
    while (lineIndex < step.lines.length) {
      body.appendChild(renderLine(step.lines[lineIndex]));
      lineIndex++;
    }
    addCursor();
    scrollToBottom();
  }
}

function updatePlayBtn() {
  document.getElementById("btnPlay").innerHTML = playing ? "&#10074;&#10074; Pause" : "&#9654; Play";
}
